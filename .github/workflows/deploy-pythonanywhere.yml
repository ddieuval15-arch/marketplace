name: Déploiement helloBiz vers PythonAnywhere

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'deploy/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests

      - name: Patcher et déployer sur PythonAnywhere
        env:
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_USERNAME: donytchicaya
        run: python deploy/patch_and_deploy.py

      - name: Publier le snapshot live (si genere)
        run: |
          if [ -f "live_snapshot_app.py" ] || [ -f "live_snapshot_database.py" ]; then
            git config user.email "ddieuval15@gmail.com"
            git config user.name "helloBiz Bot"
            git add live_snapshot_app.py live_snapshot_database.py 2>/dev/null || true
            git commit -m "Snapshot live app.py/database.py pour fusion" || echo "rien a committer"
            git push
          else
            echo "Pas de snapshot genere"
          fi
