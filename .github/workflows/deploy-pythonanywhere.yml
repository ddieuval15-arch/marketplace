name: Déploiement helloBiz vers PythonAnywhere

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'deploy/**'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests

      - name: Patcher et déployer sur PythonAnywhere
        env:
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_USERNAME: donytchicaya
        run: python deploy/patch_and_deploy.py
