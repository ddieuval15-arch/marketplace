<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 58" width="220" height="58" role="img" aria-label="helloBiz — Le bazar du Congo">
  <title>helloBiz — Le bazar du Congo</title>
  <!-- "hello" en blanc -->
  <text x="0" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-0.8">hello</text>
  <!-- "Biz" en turquoise -->
  <text x="90" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#00b7aa" letter-spacing="-0.8">Biz</text>
  <!-- Ligne signature -->
  <rect x="0" y="35" width="170" height="2" rx="1" fill="#00b7aa" opacity="0.35"/>
  <!-- Tagline -->
  <text x="1" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="400" fill="#888888" letter-spacing="2">LE BAZAR DU CONGO</text>
</svg>
