<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a1a2edd;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Fond -->
  <rect width="400" height="280" fill="url(#g)"/>
  <!-- Cercle accent décoratif -->
  <circle cx="340" cy="40" r="80" fill="#e91e8c" opacity="0.06"/>
  <circle cx="60" cy="240" r="60" fill="#e91e8c" opacity="0.05"/>
  <!-- Cercle central -->
  <circle cx="200" cy="120" r="52" fill="#e91e8c" opacity="0.12"/>
  <circle cx="200" cy="120" r="38" fill="#e91e8c" opacity="0.15"/>
  <!-- Emoji/icône -->
  <text x="200" y="136" text-anchor="middle" font-size="44" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">👗</text>
  <!-- Label catégorie -->
  <text x="200" y="196" text-anchor="middle" font-size="15" font-weight="700" font-family="Arial, sans-serif" fill="#e91e8c" letter-spacing="0.5">MODE & BEAUTÉ</text>
  <!-- Sous-texte -->
  <text x="200" y="218" text-anchor="middle" font-size="11" font-family="Arial, sans-serif" fill="rgba(255,255,255,0.45)" letter-spacing="0.3">Aucune photo disponible</text>
  <!-- Logo helloBiz -->
  <text x="200" y="256" text-anchor="middle" font-size="10" font-weight="700" font-family="Arial, sans-serif" fill="#e91e8c" opacity="0.5" letter-spacing="1">helloBiz</text>
</svg>